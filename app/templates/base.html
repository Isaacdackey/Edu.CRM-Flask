<!DOCTYPE html>
<html>

<head>
    <title>EduCRM</title>
</head>

<body>

    <h1>EduCRM</h1>

    <nav>
        <a href="{{ url_for('dashboard.dashboard') }}">Dashboard</a> |
        <a href="{{ url_for('students.students_list') }}">Students</a> |
        <a href="{{ url_for('teachers.teachers_list') }}">Teachers</a> |
        <a href="{{ url_for('courses.courses_list') }}">Courses</a> |
        <a href="{{ url_for('auth.logout') }}">Logout</a>
    </nav>

    <hr>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}

    {% for category, message in messages %}
    <p>{{ message }}</p>
    {% endfor %}

    {% endif %}
    {% endwith %}

    {% block content %}
    {% endblock %}

</body>

</html>
