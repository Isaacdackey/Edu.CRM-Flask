{% extends "base.html" %}

{% block title %}Assigner un étudiant{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <div class="flex items-center gap-4 mb-2">
            <a href="{{ url_for('courses.courses_list') }}" 
               class="inline-flex items-center text-gray-600 dark:text-gray-400 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                <i class="fa-solid fa-arrow-left mr-2"></i>
                Retour à la liste
            </a>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Assigner un étudiant</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Cours: <span class="font-medium text-primary-600 dark:text-primary-400">{{ course.title }}</span></p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-primary-500 to-primary-600"></div>
        <div class="p-6">
            <form method="POST" action="{{ url_for('courses.assign_student', course_id=course.id) }}" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Sélectionner un étudiant</label>
                    <select name="student_id" required
                            class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 dark:bg-gray-700 dark:text-white">
                        <option value="">Choisir...</option>
                        {% for student in students %}
                        <option value="{{ student.id }}">{{ student.name }} - {{ student.email }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 py-2 bg-primary-600 text-white font-medium rounded-lg hover:bg-primary-700 transition-colors">
                        Assigner
                    </button>
                    <a href="{{ url_for('courses.courses_list') }}" 
                       class="flex-1 py-2 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-medium rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 text-center transition-colors">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
