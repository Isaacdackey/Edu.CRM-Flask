{% extends "base.html" %}

{% block title %}Créer un cours{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Créer un cours</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Remplissez les informations ci-dessous</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
        <div class="h-2 bg-gradient-to-r from-primary-500 to-primary-600"></div>
        <form method="POST" action="{{ url_for('courses.create_course') }}" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Titre du cours</label>
                <input type="text" name="title" required
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 dark:bg-gray-700 dark:text-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">ID de l'enseignant</label>
                <input type="number" name="teacher_id" required
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary-500 dark:bg-gray-700 dark:text-white">
            </div>

    
            <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-xl border border-gray-200 dark:border-gray-700">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-regular fa-calendar text-primary-500 dark:text-white"></i>
                    <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300">
                        Planification du cours
                    </h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-300 mb-1">Jour</label>
                        <select name="day" required
                            class="w-full px-3 pr-8 py-2 rounded-lg border border-gray-300 dark:border-gray-600 
                            bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200
                            focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition
                            appearance-none">
                            <option value="">Choisir</option>
                            <option value="Lundi">Lundi</option>
                            <option value="Mardi">Mardi</option>
                            <option value="Mercredi">Mercredi</option>
                            <option value="Jeudi">Jeudi</option>
                            <option value="Vendredi">Vendredi</option>
                            <option value="Samedi">Samedi</option>
                        </select>
                    </div>

                
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-300 mb-1">Heure</label>
                        <input type="time" name="time" required
                            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 
                                bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200
                                focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition">
                    </div>

                  
                    <div>
                        <label class="block text-xs font-medium text-gray-500 dark:text-gray-300 mb-1">Statut</label>
                        <select name="status" required
                            class="w-full px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 
                                bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200
                                focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition">
                            <option value="Planifié">Planifié</option>
                            <option value="En cours">En cours</option>
                            <option value="Terminé">Terminé</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit" class="flex-1 py-2 bg-primary-600 text-white font-medium rounded-lg hover:bg-primary-700 transition">
                    Créer
                </button>
                <a href="{{ url_for('courses.courses_list') }}" 
                   class="flex-1 py-2 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 font-medium rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 text-center transition">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
